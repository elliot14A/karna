name: PR Test

env:
  SQLX_OFFLINE: true
  DATABASE_URL: sqlite://test.sqlite

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v20
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Verify SQLx metadata
        run: |
          if [ -d ".sqlx" ]; then
            echo "Found .sqlx directory, will use SQLx offline mode"
            ls -la .sqlx
          else
            echo "Warning: .sqlx directory not found. Run queries locally and commit the .sqlx directory."
            echo "::warning::.sqlx directory not found. SQLx query checking may fail."
          fi

      - name: Nix cache
        uses: actions/cache@v3
        with:
          path: /nix/store
          key: ${{ runner.os }}-nix-${{ hashFiles('**/shell.nix') }}

      - name: Lint rust code
        run: |
          nix-shell shell.nix --run "cargo fmt --all"
          nix-shell shell.nix --run "cargo clippy -- -D warnings"

      - name: Run tests
        run: |
          nix-shell shell.nix --run "cargo test"
